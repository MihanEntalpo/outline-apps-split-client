name: Build and Test / Client

concurrency:
  group: '${{ github.head_ref || github.ref }} Client'
  cancel-in-progress: true

on:
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - 'client/**'
      - 'infrastructure/**'
      - '.github/workflows/build_and_test_debug_client.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.nvmrc'
      - 'go.mod'
      - 'go.sum'
  push:
    branches:
      - master
    paths:
      - 'client/**'
      - 'infrastructure/**'
      - '.github/workflows/build_and_test_debug_client.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.nvmrc'
      - 'go.mod'
      - 'go.sum'

jobs:
  web_test:
    name: Web Test
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v2.3.4

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ./package-lock.json

      - name: Install NPM Dependencies
        run: npm set cache .npm && npm ci

      - name: Build Web App
        run: npm run action client/web/build

      - name: Test Web App
        run: npm run action client/web/test

      # - uses: codecov/codecov-action@v3
      #   with:
      #     files: ./client/src/output/coverage/www/coverage-final.json
      #     flags: unittests, www

  backend_test:
    name: Go Backend Test
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v2.3.4

      - name: Install Go
        uses: actions/setup-go@v4
        with:
          go-version-file: '${{ github.workspace }}/go.mod'

      - name: Test Go Backend
        run: go test -race -bench=. -benchtime=100ms ./client/...

  android_debug_build:
    name: Android Debug Build
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: [web_test, backend_test]
    steps:
      - name: Checkout
        uses: actions/checkout@v2.3.4

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ./package-lock.json

      - name: Setup Java
        run: echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Android Client
        run: npm run action client/src/cordova/build android -- --verbose
